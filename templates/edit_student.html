<!DOCTYPE html>
<html>

<head>

<title>Edit Student</title>

<link rel="stylesheet" href="/static/style.css">

<script>

function calculateTotal(){

let admission =
parseInt(document.getElementById("admission").value) || 0

let tuition =
parseInt(document.getElementById("tuition").value) || 0

let bus =
parseInt(document.getElementById("bus").value) || 0

let computer =
parseInt(document.getElementById("computer").value) || 0

let other =
parseInt(document.getElementById("other").value) || 0

document.getElementById("total_fee").value =

admission +
tuition +
bus +
computer +
other

}

</script>

</head>

<body>

<div class="logo-bg"></div>

<div class="contact-info">
R B AKSHIT | 8147842484
</div>

<!-- SIDEBAR -->

<div class="sidebar">

<h3>School ERP</h3>

<a href="/dashboard">Dashboard</a>
<a href="/students">Students</a>
<a href="/expenses">Expenses</a>
<a href="/logout">Logout</a>

</div>

<!-- MAIN -->

<div class="main">

<h1>Edit Student</h1>

<form
method="post"
class="student-form"
>

<div class="form-group">

<label>Admission Number</label>

<input
type="text"
name="adm"
value="{{student.admission}}"
required
>

</div>

<div class="form-group">

<label>Student Name</label>

<input
type="text"
name="name"
value="{{student.name}}"
required
>

</div>

<div class="form-group">

<label>Class</label>

<input
type="text"
name="class"
value="{{student.class}}"
required
>

</div>

<div class="form-group">

<label>Parent Name</label>

<input
type="text"
name="parent"
value="{{student.parent}}"
>

</div>

<div class="form-group">

<label>Phone Number</label>

<input
type="text"
name="phone"
value="{{student.phone}}"
>

</div>

<div class="form-group">

<label>Admission Fee ₹</label>

<input
type="number"
id="admission"
name="admission_fee"
value="{{student.admission_fee}}"
onkeyup="calculateTotal()"
>

</div>

<div class="form-group">

<label>Tuition Fee ₹</label>

<input
type="number"
id="tuition"
name="tuition_fee"
value="{{student.tuition_fee}}"
onkeyup="calculateTotal()"
>

</div>

<div class="form-group">

<label>Bus Fee ₹</label>

<input
type="number"
id="bus"
name="bus_fee"
value="{{student.bus_fee}}"
onkeyup="calculateTotal()"
>

</div>

<div class="form-group">

<label>Computer Fee ₹</label>

<input
type="number"
id="computer"
name="computer_fee"
value="{{student.computer_fee}}"
onkeyup="calculateTotal()"
>

</div>

<div class="form-group">

<label>Other Fee ₹</label>

<input
type="number"
id="other"
name="other_fee"
value="{{student.other_fee}}"
onkeyup="calculateTotal()"
>

</div>

<div class="form-group">

<label>Total Fee ₹</label>

<input
type="number"
id="total_fee"
value="{{student.total_fee}}"
readonly
>

</div>

<button type="submit">

UPDATE STUDENT

</button>

</form>

</div>

</body>
</html>
