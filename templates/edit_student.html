<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="/static/style.css">

<script>
function calculateTotal(){

let admission = parseInt(document.getElementById("admission").value) || 0;
let tuition = parseInt(document.getElementById("tuition").value) || 0;
let bus = parseInt(document.getElementById("bus").value) || 0;
let computer = parseInt(document.getElementById("computer").value) || 0;
let other = parseInt(document.getElementById("other").value) || 0;

document.getElementById("total_fee").value =
admission + tuition + bus + computer + other;

}
</script>

</head>

<body>

<div class="logo-bg"></div>

<div class="sidebar">
    <h3>School ERP</h3>

    <a href="/dashboard">Dashboard</a>
    <a href="/students">Students</a>
</div>

<div class="main">

<h2>Edit Student</h2>

<form method="post" class="student-form">

    <div class="form-group">
        <label>Admission No</label>
        <input 
            name="adm"
            placeholder="Enter Admission Number"
            value="{{student.admission}}">
    </div>

    <div class="form-group">
        <label>Student Name</label>
        <input 
            name="name"
            placeholder="Enter Student Name"
            value="{{student.name}}">
    </div>

    <div class="form-group">
        <label>Class</label>
        <input 
            name="class"
            placeholder="Enter Class"
            value="{{student.class}}">
    </div>

    <div class="form-group">
        <label>Parent Name</label>
        <input 
            name="parent"
            placeholder="Enter Parent Name"
            value="{{student.parent}}">
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input 
            name="phone"
            placeholder="Enter Phone Number"
            value="{{student.phone}}">
    </div>

    <div class="form-group">
        <label>Admission Fee ₹</label>
        <input 
            id="admission"
            name="admission_fee"
            placeholder="Enter Admission Fee"
            value="{{student.admission_fee}}"
            onkeyup="calculateTotal()">
    </div>

    <div class="form-group">
        <label>Tuition Fee ₹</label>
        <input 
            id="tuition"
            name="tuition_fee"
            placeholder="Enter Tuition Fee"
            value="{{student.tuition_fee}}"
            onkeyup="calculateTotal()">
    </div>

    <div class="form-group">
        <label>Bus Fee ₹</label>
        <input 
            id="bus"
            name="bus_fee"
            placeholder="Enter Bus Fee"
            value="{{student.bus_fee}}"
            onkeyup="calculateTotal()">
    </div>

    <div class="form-group">
        <label>Computer Fee ₹</label>
        <input 
            id="computer"
            name="computer_fee"
            placeholder="Enter Computer Fee"
            value="{{student.computer_fee}}"
            onkeyup="calculateTotal()">
    </div>

    <div class="form-group">
        <label>Other Fee ₹</label>
        <input 
            id="other"
            name="other_fee"
            placeholder="Enter Other Fee"
            value="{{student.other_fee}}"
            onkeyup="calculateTotal()">
    </div>

    <div class="form-group">
        <label>Total Fee ₹</label>
        <input 
            id="total_fee"
            placeholder="Total Fee"
            value="{{student.total_fee}}"
            readonly>
    </div>

    <button type="submit">Update Student</button>

</form>

</div>

</body>
</html>
