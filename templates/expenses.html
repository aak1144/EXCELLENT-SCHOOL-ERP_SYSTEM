<!DOCTYPE html>
<html>

<head>

<title>Expenses</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="logo-bg"></div>

<div class="contact-info">
R B AKSHIT | 8147842484
</div>

<!-- SIDEBAR -->

<div class="sidebar">

<h3>School ERP</h3>

<a href="/dashboard">Dashboard</a>
<a href="/students">Students</a>
<a href="/expenses">Expenses</a>
<a href="/logout">Logout</a>

</div>

<!-- MAIN -->

<div class="main">

<h1>Expenses Management</h1>

<!-- FLASH -->

{% with messages = get_flashed_messages() %}
{% if messages %}

<div
style="
background:#16a34a;
color:white;
padding:12px;
border-radius:10px;
margin-bottom:20px;
"
>

{{messages[0]}}

</div>

{% endif %}
{% endwith %}

<!-- FORM -->

<form
method="post"
class="student-form"
>

<div class="form-group">

<label>Expense Title</label>

<input
type="text"
name="title"
required
>

</div>

<div class="form-group">

<label>Amount ₹</label>

<input
type="number"
name="amount"
required
>

</div>

<div class="form-group">

<label>Category</label>

<input
type="text"
name="category"
required
>

</div>

<button type="submit">

ADD EXPENSE

</button>

</form>

<!-- TABLE -->

<table class="student-table">

<thead>

<tr>

<th>Title</th>
<th>Category</th>
<th>Amount</th>

</tr>

</thead>

<tbody>

{% for e in expenses %}

<tr>

<td>{{e.title}}</td>

<td>{{e.category}}</td>

<td>₹{{e.amount}}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
