<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="logo-bg"></div>

<div
style="
display:flex;
justify-content:center;
align-items:center;
height:100vh;
"
>

<form
method="post"
style="
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
width:350px;
"
>

<h1
style="
text-align:center;
margin-bottom:20px;
"
>

School ERP Login

</h1>

<input
type="text"
name="username"
placeholder="Username"
required
style="
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ccc;
"
>

<input
type="password"
name="password"
placeholder="Password"
required
style="
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ccc;
"
>

<button
type="submit"
style="
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
"
>

LOGIN

</button>

</form>

</div>

</body>
</html>
